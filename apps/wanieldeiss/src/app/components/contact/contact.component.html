<wd-container size="page">
  <wd-section-header index="05" title="Contact" />

  <h3
    class="font-display text-3xl font-light leading-[1.15] tracking-[var(--tracking-display)] text-fg-strong md:text-5xl"
  >
    Let's build something
  </h3>
  <p class="mt-4 max-w-prose text-fg-muted">
    Platzhalter — kurzer Text zur Kontaktaufnahme. Schreib mir gerne eine
    Nachricht, wenn du an einer Zusammenarbeit interessiert bist.
  </p>

  <div class="mt-12 grid gap-6 sm:grid-cols-3">
    @for (link of links; track link.label) {
      <a
        [href]="link.href"
        [target]="link.external ? '_blank' : null"
        [rel]="link.external ? 'noopener noreferrer' : null"
        class="contact-link"
      >
        <wd-card
          class="contact-card flex flex-col items-center gap-4 text-center"
        >
          <lucide-icon
            [img]="link.icon"
            [size]="32"
            [strokeWidth]="1.5"
            class="text-fg-muted transition-colors group-hover:text-accent"
          />
          <span
            class="font-display text-lg font-light tracking-[var(--tracking-display)] text-fg-strong"
          >
            {{ link.label }}
          </span>
        </wd-card>
      </a>
    }
  </div>
</wd-container>
